name: LockOut
options:
  bundleIdPrefix: com.lockout
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"

packages:
  LockOutCore:
    path: Packages/LockOutCore
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  LockOut-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: LockOut-macOS
    dependencies:
      - package: LockOutCore
      - package: Sparkle
        product: Sparkle
    info:
      path: LockOut-macOS/Info.plist
      properties:
        LSUIElement: true           # menu bar agent, no Dock icon
        SUFeedURL: "$(SPARKLE_FEED_URL)"
        SUPublicEDKey: "$(SPARKLE_ED_KEY)"
        CLOUDKIT_CONTAINER_ID: "$(CLOUDKIT_CONTAINER_ID)"
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(PRODUCT_BUNDLE_IDENTIFIER)
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_NAME: LockOut
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        CODE_SIGN_ENTITLEMENTS: LockOut-macOS/LockOut-macOS.entitlements

  LockOut-macOSUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: LockOut-macOSUITests
    dependencies:
      - target: LockOut-macOS
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TEST_HOST: ""
        BUNDLE_LOADER: ""

schemes:
  LockOut-macOS:
    build:
      targets:
        LockOut-macOS: all
    test:
      config: Debug
      targets:
        - LockOut-macOSUITests
    run:
      config: Debug
    archive:
      config: Release
